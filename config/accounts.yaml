# V2b Paper Trading 帳戶設定
#
# 帳戶名稱: aggressive
# 策略: V2b EMA(30/100) CD2 ATR×2.0 ADX>25
# 商品: MXF (小台指)
# 初始資金: 880,000 NTD

accounts:
  aggressive:
    equity: 880000
    contracts: 6

    strategy_params:
      ema_fast: 30
      ema_slow: 100
      atr_stop_mult: 2.0
      confirm_days: 2
      adx_threshold: 25

    scale_ladder:
      - equity: 350000
        contracts: 2
      - equity: 480000
        contracts: 3
      - equity: 600000
        contracts: 4
      - equity: 720000
        contracts: 5
      - equity: 840000
        contracts: 6
      - equity: 960000
        contracts: 7

    margin_per_contract: 119250
    max_contracts: 8

    sessions:
      day:
        execution_timing: "night_open"
        decision_time: "14:30"
        execution_time: "15:05"
        enable_tsmc_signal: false
