# V2b Paper Trading 帳戶設定 — 多市場
#
# mxf_aggressive: MXF (小台指) — V2b CD2 ADX>25
# tsmc_2330:      2330 股票期貨 (CDF) — V2b CD2 ADX>30, 不強制結算平倉

accounts:
  mxf_aggressive:
    product: MXF
    equity: 880000
    strategy_params:
      ema_fast: 30
      ema_slow: 100
      atr_stop_mult: 2.0
      confirm_days: 2
      adx_threshold: 25
    # Ladder built ONCE to equity = 10,000,000 by a fixed rule — never hand-tune:
    #   起始 350K → 2 口；每 +120K equity → +1 口（350K=2, 470K=3, …, 9.95M=82）。
    # 口數最終由 equity/margin 決定：實際口數 = min(ladder, floor(equity/margin), max_contracts)。
    # margin_per_contract=131,500 → 10M equity 的 margin cap ≈ 76 口（先於 ladder 綁定）。
    scale_ladder:
